<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrieren – Nachtgreifer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0e0e12; color: #cdd6f4; }
    input { background-color: #1e1e2e; border: 1px solid #313244; color: #cdd6f4; }
    input:focus { outline: none; border-color: #cba6f7; }
    input::placeholder { color: #6c6f85; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="text-3xl font-bold tracking-tight" style="color:#cba6f7">&#x2736; nachtgreifer</a>
      <p class="text-[#6c6f85] mt-2 text-sm">Konto erstellen</p>
    </div>

    <div style="background:#16161e;border:1px solid #313244" class="rounded-2xl p-8">
      <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1.5">Benutzername</label>
          <input type="text" id="username" required minlength="3" maxlength="50" placeholder="nachtgreifer42"
            class="w-full rounded-lg px-3 py-2.5 text-sm" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">E-Mail</label>
          <input type="email" id="email" required placeholder="deine@email.de"
            class="w-full rounded-lg px-3 py-2.5 text-sm" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Passwort</label>
          <input type="password" id="password" required minlength="8" placeholder="Mindestens 8 Zeichen"
            class="w-full rounded-lg px-3 py-2.5 text-sm" />
        </div>

        <div id="errors" class="hidden space-y-1"></div>

        <button type="submit" id="submit-btn"
          class="w-full py-2.5 rounded-lg font-medium text-sm transition-opacity hover:opacity-90"
          style="background:#cba6f7;color:#0e0e12">
          Registrieren
        </button>
      </form>

      <p class="text-center text-sm text-[#6c6f85] mt-6">
        Bereits ein Konto?
        <a href="/login.html" class="text-[#cba6f7] hover:underline">Einloggen</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (getToken()) location.href = '/';

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errDiv = document.getElementById('errors');
      errDiv.classList.add('hidden');
      errDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Wird registriert...';

      try {
        const { token, user } = await api.register({
          username: document.getElementById('username').value.trim(),
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        setAuth(token, user);
        location.href = '/';
      } catch (e) {
        errDiv.innerHTML = `<p class="text-sm text-[#f38ba8]">${e.message}</p>`;
        errDiv.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Registrieren';
      }
    }
  </script>
</body>
</html>
